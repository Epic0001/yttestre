name: Build YTKHelper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: beerpiss/theos-action@v1

      - name: Build tweak
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Locate built dylib
        id: locate
        run: |
          DYLIB=$(find . -name 'YTKHelper.dylib' -path '*obj*' | head -n 1)
          echo "Found: $DYLIB"
          mkdir -p out
          cp "$DYLIB" out/YTKHelper.dylib
          echo "dylib_path=out/YTKHelper.dylib" >> $GITHUB_OUTPUT

      - name: Fix install_name for IPA injection
        run: |
          DYLIB="${{ steps.locate.outputs.dylib_path }}"

          echo "=== Original load commands ==="
          otool -L "$DYLIB"

          # macOS Theos build already uses @rpath/CydiaSubstrate.framework/CydiaSubstrate.
          # Just add rpath search paths to ensure it's found in both bundle locations.
          install_name_tool -add_rpath @executable_path/Frameworks "$DYLIB" 2>/dev/null || true
          install_name_tool -add_rpath @loader_path "$DYLIB" 2>/dev/null || true
          install_name_tool -add_rpath @loader_path/.. "$DYLIB" 2>/dev/null || true

          # Re-sign with ldid (Theos provides this)
          ldid -S "$DYLIB" 2>/dev/null || true

          echo "=== Patched load commands ==="
          otool -L "$DYLIB"

      - name: Create both .deb and .dylib outputs
        run: |
          # Copy any .deb produced
          find packages -name "*.deb" -exec cp {} out/ \; 2>/dev/null || true
          ls -la out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTKHelper
          path: out/*
